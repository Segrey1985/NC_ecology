services:
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage

  app:
    image: ecology-app-cuda
    depends_on:
      - qdrant
    environment:
      QDRANT_URL: "http://qdrant:6333"
      EMBEDDINGS_LOCAL: "false"
      USE_LANGFUSE: "false"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    gpus: all

volumes:
  qdrant_data:
