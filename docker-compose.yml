services:
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  mongo:
    image: mongo:8
    restart: unless-stopped
    command: ["mongod", "--quiet"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_started
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017/
      ME_CONFIG_SITE_BASEURL: /mongo
      ME_CONFIG_BASICAUTH_ENABLED: "false"
      ME_CONFIG_SITE_COOKIESECRET: dev-cookie-secret
      ME_CONFIG_SITE_SESSIONSECRET: dev-session-secret

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ecology-app-cuda
    depends_on:
      qdrant:
        condition: service_started
      mongo:
        condition: service_started
    environment:
      QDRANT_URL: "http://qdrant:6333"
      MONGO_URI: "mongodb://mongo:27017"
      EMBEDDINGS_LOCAL: "false"
      USE_LANGFUSE: "false"
      TZ: Europe/Moscow
    env_file:
      - .env
    ports:
      - "80:80"
    gpus: all
    restart: unless-stopped

volumes:
  qdrant_data:
  mongo_data:

